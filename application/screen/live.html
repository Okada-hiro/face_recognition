<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reception App</title>
  <link rel="stylesheet" href="/app-assets/styles.css">
</head>
<body class="app-live">
  <main class="live-stage">
    <section class="phone-shell live-phone-shell" aria-label="smartphone reception app">
      <div class="phone-frame">
        <div class="phone-screen" data-state="idle">
          <div class="status-bar">
            <span id="status-time">9:41</span>
            <span>Reception AI</span>
            <span id="net-pill">Secure</span>
          </div>

          <div class="ambient ambient-left"></div>
          <div class="ambient ambient-right"></div>
          <div class="scanline"></div>

          <header class="hero">
            <div class="hero-copy">
              <p class="eyebrow">Smart Reception</p>
              <h2 id="hero-title">待機中</h2>
              <p id="hero-subtitle">カメラとマイクの準備をしています。</p>
            </div>
            <div class="state-pill" id="state-pill">BOOT</div>
          </header>

          <section class="avatar-zone">
            <div class="halo halo-outer"></div>
            <div class="halo halo-middle"></div>
            <div class="halo halo-inner"></div>

            <div class="assistant-face" id="assistant-face" aria-hidden="true">
              <div class="brow brow-left"></div>
              <div class="brow brow-right"></div>
              <div class="eye eye-left">
                <span class="eye-core"></span>
              </div>
              <div class="eye eye-right">
                <span class="eye-core"></span>
              </div>
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
              <div class="mouth">
                <span class="mouth-shape"></span>
              </div>
              <div class="voice-bars">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>

            <div class="orbit-text" id="orbit-text">BOOTING</div>
          </section>

          <section class="feed-card">
            <div class="feed-head">
              <span class="feed-title">Recognition Feed</span>
              <span class="feed-badge" id="feed-badge">Connecting</span>
            </div>
            <div class="feed-body">
              <div class="feed-camera">
                <img id="feed-image" class="feed-image" alt="annotated recognition frame">
                <video id="camera-video" class="camera-video" autoplay playsinline muted></video>
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
                <div class="target-box" id="target-box"></div>
                <div class="target-label" id="target-label">booting...</div>
              </div>
              <div class="feed-meta">
                <div class="meta-row">
                  <span class="meta-key">Target</span>
                  <span class="meta-value" id="meta-target">未検知</span>
                </div>
                <div class="meta-row">
                  <span class="meta-key">Identity</span>
                  <span class="meta-value" id="meta-identity">Unknown</span>
                </div>
                <div class="meta-row">
                  <span class="meta-key">Mode</span>
                  <span class="meta-value" id="meta-mode">Standby</span>
                </div>
              </div>
            </div>
          </section>

          <section class="dialogue-card">
            <div class="dialogue-head">
              <span>Live Dialogue</span>
              <span id="dialogue-stage">Booting</span>
            </div>
            <div class="bubble bubble-user" id="bubble-user">……</div>
            <div class="bubble bubble-ai" id="bubble-ai">受付アプリを起動しています。</div>
          </section>

          <div class="app-boot" id="app-boot">
            <div class="app-boot-card">
              <p class="eyebrow">Reception App</p>
              <h1>受付を開始</h1>
              <p id="boot-copy">この端末のカメラとマイクを使って受付を開始します。</p>
              <button class="live-primary-button" id="boot-start">受付を開始する</button>
              <p class="app-boot-note" id="boot-note">RunPod 上の認識・会話システムへ接続します。</p>
            </div>
          </div>

          <div class="live-debug-pill" id="live-debug-pill">connecting...</div>
          <canvas id="capture-canvas" class="capture-canvas" aria-hidden="true"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="/app-assets/live.js"></script>
</body>
</html>
